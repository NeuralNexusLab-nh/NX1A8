<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>量子疊加態隨機抽籤系統 v7</title>
<style>
*{box-sizing:border-box;}
body{
  margin:0;
  background:#000;
  color:#0ff;
  font-family:'Courier New',monospace;
  text-align:center;
  overflow:hidden;
  user-select:none;
}
canvas{position:fixed;top:0;left:0;z-index:-3;}
body::after{
  content:"";
  position:fixed;width:100%;height:100%;
  background:repeating-linear-gradient(rgba(0,0,0,0.18) 0px,rgba(0,0,0,0.18) 2px,transparent 2px,transparent 4px);
  pointer-events:none;z-index:-2;
}
#bgWord{
  position:fixed;width:100%;height:100%;
  white-space:pre;font-size:16px;opacity:0.1;
  color:#0f0;z-index:-1;pointer-events:none;
}
#app{
  position:relative;min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:20px 10px 30px;gap:10px;
}
h1{font-size:26px;letter-spacing:4px;color:#0ff;text-shadow:0 0 12px #0ff;margin:0 0 2px;}
.subtitle{font-size:12px;color:#0f0;letter-spacing:6px;opacity:0.6;margin-bottom:8px;}

.controls{
  background:rgba(0,255,255,0.04);
  border:1px solid rgba(0,255,255,0.2);
  border-radius:10px;padding:14px 24px;
  display:flex;flex-direction:column;gap:10px;
  width:min(420px,92vw);
}
.row{display:flex;align-items:center;gap:10px;font-size:15px;}
.row label{color:#0f0;min-width:60px;text-align:left;}
input{
  background:rgba(0,0,0,0.6);color:#0ff;
  border:1px solid #0ff;border-radius:4px;
  padding:6px 10px;font-family:inherit;font-size:15px;
  width:70px;text-align:center;outline:none;transition:border-color 0.2s;
}
input:focus{border-color:#f0f;}
input#absent{width:100%;flex:1;}
.sep{color:#0ff;font-size:18px;}
#btn{
  margin-top:4px;width:100%;padding:14px;
  font-family:inherit;font-size:20px;letter-spacing:4px;
  color:#000;background:#0ff;border:none;border-radius:6px;
  cursor:pointer;transition:all 0.15s;font-weight:bold;
}
#btn:hover:not(:disabled){background:#f0f;box-shadow:0 0 20px #f0f;}
#btn:active:not(:disabled){transform:scale(0.97);}
#btn:disabled{opacity:0.3;cursor:not-allowed;}

/* 台詞區塊 */
#scriptBox{
  width:min(500px,92vw);
  min-height:90px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:8px;
}
.line{
  font-size:18px;
  color:#ff0;
  letter-spacing:2px;
  text-shadow:0 0 8px #ff0;
  opacity:0;
  transform:translateY(6px);
  transition:opacity 0.4s ease, transform 0.4s ease;
  line-height:1.5;
}
.line.show{opacity:1;transform:translateY(0);}
.line.dim{opacity:0.3;color:#fa0;}

/* 數字 */
#number{
  font-size:clamp(100px,18vw,150px);
  font-weight:bold;line-height:1;
  text-shadow:0 0 30px #0ff,0 0 60px #f0f;
  letter-spacing:-2px;
  min-height:160px;
  display:flex;align-items:center;justify-content:center;
}

/* 進度條 */
#progressWrap{width:min(420px,92vw);height:3px;background:rgba(0,255,255,0.1);border-radius:2px;overflow:hidden;}
#progressBar{height:100%;width:0%;background:linear-gradient(90deg,#0ff,#f0f);border-radius:2px;}

#history{font-size:13px;color:rgba(0,255,255,0.4);letter-spacing:2px;min-height:20px;}

@keyframes flash{
  0%,100%{text-shadow:0 0 30px #0ff,0 0 60px #f0f;}
  50%{text-shadow:0 0 80px #fff,0 0 160px #f0f;}
}
.flashing{animation:flash 0.3s ease-in-out 4;}
</style>

<canvas id="matrix"></canvas>

<div id="app">

  <div class="subtitle">QUANTUM SUPERPOSITION LOTTERY v6</div>

    <div class="row">
      <label>範圍</label>
      <input id="min" value="1">
      <span class="sep">—</span>
      <input id="max" value="50">
    </div>
    <div class="row">
      <label>缺席</label>
      <input id="absent" placeholder="如：3, 5, 10">
    </div>
    <button id="btn" onclick="start()">⚡ 開始抽籤</button>
  </div>

  <div id="scriptBox"></div>

  <div id="number">?</div>

  <div id="progressWrap"><div id="progressBar"></div></div>

  <div id="history"></div>
</div>

<script>
let running=false;
let setIndex=0;
let historyList=[];

const numberEl=document.getElementById("number");
const scriptBox=document.getElementById("scriptBox");
const bgEl=document.getElementById("bgWord");
const btnEl=document.getElementById("btn");
const progressBar=document.getElementById("progressBar");
const historyEl=document.getElementById("history");

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

function rand(min, max, ex) {
    let limit = 0;
    const rangeSize = max - min + 1;
    
    // 如果排除清單太長，直接返回 null 避免無窮迴圈
    if (ex.length >= rangeSize) return null;

    // 使用多種亂數來源混合
    const seed = () => (performance.now() * Math.random() * (Math.random() + 1)) % 1;
    
    // 自訂的亂數產生器（混合線性同餘與雜湊）
    let lastValue = seed();
    const customRand = () => {
        lastValue = (lastValue * 9301 + 49297) % 233280;
        return lastValue / 233280;
    };

    do {
        // 動態切換亂數方法，增加不可預測性
        let r;
        if (Math.random() < 0.7) {
            r = customRand();               // 70% 用自訂亂數
        } else {
            r = Math.random();               // 30% 用內建亂數
            if (Math.random() < 0.5) {
                r = (r + Math.sin(performance.now()) * 0.5) % 1; // 加入時間干擾
            }
        }

        let n = Math.floor(r * (max - min + 1)) + min;
        
        // 額外抖動：極低機率直接忽略 ex 檢查（增加隨機驚喜）
        if (Math.random() < 0.02 && !ex.includes(n)) return n;

        limit++;
        if (limit > 2000) return null;  // 放寬嘗試次數，避免太快失敗
    } while (ex.includes(n));
    
    return n;
}

function getAbsent(){
  return document.getElementById("absent").value
    .split(/[,，\s]+/).map(x=>parseInt(x.trim())).filter(x=>!isNaN(x));
}

// Matrix rain
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;canvas.height=window.innerHeight;
window.addEventListener("resize",()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
const fontSize=14;
let drops=[];
for(let i=0;i<canvas.width/fontSize;i++)drops[i]=Math.random()*canvas.height/fontSize;
function drawMatrix(){
  ctx.fillStyle="rgba(0,0,0,0.05)";ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#0f0";ctx.font=fontSize+"px monospace";
  for(let i=0;i<drops.length;i++){
    ctx.fillText(Math.random()>0.5?"1":"0",i*fontSize,drops[i]*fontSize);
    if(drops[i]*fontSize>canvas.height&&Math.random()>0.975)drops[i]=0;
    drops[i]++;
  }
}
setInterval(drawMatrix,33);

function genBgWord(text){
  let o="";
  for(let i=0;i<720;i++){o+=Math.random()>0.5?"0":"1";if(i%72===0)o+="\n";}
  o+="\n\n\n        >>> "+text+" <<<";
  bgEl.innerText=o;
}

// 進度條
let progressTimer=null;
function startProgress(duration){
  let start=Date.now();clearInterval(progressTimer);progressBar.style.width="0%";
  progressTimer=setInterval(()=>{
    let pct=Math.min(100,(Date.now()-start)/duration*100);
    progressBar.style.width=pct+"%";
    if(pct>=100)clearInterval(progressTimer);
  },50);
}

// 逐句顯示台詞
async function showLines(lines){
  scriptBox.innerHTML="";
  let els=[];
  for(let l of lines){
    let div=document.createElement("div");
    div.className="line";
    div.innerText=l;
    scriptBox.appendChild(div);
    els.push(div);
  }
  for(let i=0;i<els.length;i++){
    // 把前面的句子變暗
    if(i>0) els[i-1].classList.add("dim");
    els[i].classList.add("show");
    genBgWord(lines[i]);
    await sleep(1100);
  }
  await sleep(400);
}

// 抽籤轉動
async function spin(ms,min,max,ex){
  let end=Date.now()+ms;
  let fast=true;
  setTimeout(()=>{fast=false;},ms*0.55);
  while(Date.now()<end){
    let n=rand(min,max,ex);
    numberEl.innerText=n??"-";
    numberEl.style.color=fast?"#0ff":`hsl(${Math.random()*360},100%,70%)`;
    await sleep(fast?35:90);
  }
}

async function start(){
  if(running)return;
  running=true;btnEl.disabled=true;
  progressBar.style.width="0%";
  numberEl.innerText="?";numberEl.style.color="#0ff";
  scriptBox.innerHTML="";

  let minVal=+document.getElementById("min").value;
  let maxVal=+document.getElementById("max").value;
  let absent=getAbsent();

  if(isNaN(minVal)||isNaN(maxVal)||minVal>maxVal){
    scriptBox.innerHTML="<div class='line show' style='color:#f44'>⚠ 範圍設定有誤</div>";
    running=false;btnEl.disabled=false;return;
  }
  if(absent.length>=(maxVal-minVal+1)){
    scriptBox.innerHTML="<div class='line show' style='color:#f44'>⚠ 全部缺席了 🙂</div>";
    running=false;btnEl.disabled=false;return;
  }

  let final=rand(minVal,maxVal,absent);
  let lines=scriptSets[setIndex%scriptSets.length];

  // 台詞總時長估算後開始進度條
  let talkTime=lines.length*1100+400;
  let totalTime=talkTime+2600;
  startProgress(totalTime);

  await showLines(lines);

  // 最後一句變暗
  let allLines=scriptBox.querySelectorAll(".line");
  allLines.forEach(el=>el.classList.add("dim"));

  await spin(2600,minVal,maxVal,absent);

  // 揭曉
  numberEl.innerText=final;
  numberEl.style.color="#fff";
  numberEl.classList.add("flashing");
  setTimeout(()=>numberEl.classList.remove("flashing"),1400);

  // 完成台詞
  scriptBox.innerHTML="";
  let done=document.createElement("div");
  done.className="line show";
  done.style.color="#0f0";
  done.style.fontSize="20px";
  done.innerText="完成 ✅  號碼："+final+" 號，請準備回答！";
  scriptBox.appendChild(done);
  progressBar.style.width="100%";

  historyList.unshift(final);
  if(historyList.length>6)historyList.pop();
  historyEl.innerText="歷史紀錄："+historyList.join(" · ");

  setIndex++;
  running=false;btnEl.disabled=false;
}
</script>
